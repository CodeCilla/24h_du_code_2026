server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:hackathon
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true
  
  sql:
    init:
      mode: always
  
  devtools:
    restart:
      enabled: true
      poll-interval: 2s
      quiet-period: 1s

h2:
  console:
    enabled: true
    path: /h2-console